specialist:
  metadata:
    name: node-coordinator
    version: 1.0.0
    description: "Coordinator hub for research nodes. READ_ONLY orchestrator that emits structured JSON decisions to route work across member specialists."
    category: orchestration
    tags: [node, coordinator, orchestration, json, keep-alive]
    updated: "2026-04-03"

  execution:
    mode: tool
    model: anthropic/claude-sonnet-4-5
    fallback_model: qwen-cli/qwen3-coder-plus
    timeout_ms: 0
    stall_timeout_ms: 180000
    interactive: true
    response_format: json
    output_type: orchestration
    permission_required: READ_ONLY
    thinking_level: low

  prompt:
    system: |
      You are a node coordinator. You manage a team of specialist members working toward a shared research goal. You are READ_ONLY — you do not write files or run code. You emit structured JSON decisions only.

      Your responsibilities:
      - Read member updates injected into your context
      - Decide which members to resume, steer, or spawn next
      - Maintain a running memory patch (facts, questions, decisions, handoff_summary)
      - Track coordination state (current_goal, active_members, waiting_on_members)
      - Emit a next_trigger so the NodeSupervisor knows when to resume you
      - If you need human input, set status: waiting and blocking_on.kind: human_input

      NEVER emit prose outside of the JSON object. Your entire response must be a single valid JSON object matching the output schema.

    task_template: |
      $prompt

      Node context:
      $bead_context

      Member updates (if any):
      $pre_script_output

    output_schema:
      type: object
      required: [summary, status, actions, memory_patch, coordination_state, routing_rationale, next_trigger]
      properties:
        summary:
          type: string
        status:
          type: string
          enum: [success, partial, failed, waiting]
        issues_closed:
          type: array
          items:
            type: string
        issues_created:
          type: array
          items:
            type: string
        follow_ups:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        verification:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: object
            required: [type, target, payload, reason]
            properties:
              type:
                type: string
                enum: [resume_member, steer_member, request_human_input, spawn_member, stop_member, mark_blocked, complete_node]
              target:
                type: string
              payload:
                type: string
              reason:
                type: string
              priority:
                type: number
        blocking_on:
          type: object
          properties:
            kind:
              type: string
              enum: [human_input, member_output, external_dependency]
            target:
              type: string
            details:
              type: string
        memory_patch:
          type: object
          properties:
            facts:
              type: array
              items:
                type: string
            questions:
              type: array
              items:
                type: string
            decisions:
              type: array
              items:
                type: string
            handoff_summary:
              type: string
        coordination_state:
          type: object
          properties:
            current_goal:
              type: string
            active_members:
              type: array
              items:
                type: string
            waiting_on_members:
              type: array
              items:
                type: string
            pending_decisions:
              type: array
              items:
                type: string
            blockers:
              type: array
              items:
                type: string
        routing_rationale:
          type: string
        next_trigger:
          type: object
          required: [event]
          properties:
            event:
              type: string
              enum: [on_member_update, on_human_input, on_external_update, on_timeout, manual_resume]
            target:
              type: string
            details:
              type: string

  capabilities:
    required_tools: [read, grep, find, ls]

  communication:
    next_specialists: []

  validation:
    files_to_watch:
      - src/specialist/schema.ts
      - src/specialist/runner.ts
    stale_threshold_days: 30

  beads_integration: auto
